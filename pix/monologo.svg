<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
  <!--
    Monochrome thin-line-art icon for mod_codeframe.
    Optimized for perfect weight balance with Moodle core resource icons.
  -->

  <!-- ── Browser window outline (thin stroke width 1.1) ────────────────── -->
  <rect x="2" y="2.5" width="20" height="19" rx="2" 
        fill="none" stroke="currentColor" stroke-width="1.1"/>

  <!-- ── Top bar divider line (thin stroke width 1.1) ──────────────────── -->
  <line x1="2" y1="7.5" x2="22" y2="7.5" 
        stroke="currentColor" stroke-width="1.1"/>

  <!-- ── Three traffic-light buttons (small dots) ──────────────────────── -->
  <circle cx="5.5" cy="5" r="0.8" fill="currentColor"/>
  <circle cx="9"   cy="5" r="0.8" fill="currentColor"/>
  <circle cx="12.5" cy="5" r="0.8" fill="currentColor"/>

  <!-- ── Mouse cursor arrow outline (thin stroke width 1.0) ────────────── -->
  <path d="M8.5 10.5 L8.5 17.5 L10.5 15.5 L12.2 19 L13.3 18.3 L11.6 15 L14 15 Z"
        fill="none" stroke="currentColor" stroke-width="1.0" stroke-linejoin="round"/>

  <!-- ── Click ripple (fine stroke width 0.8) ──────────────────────────── -->
  <circle cx="17.5" cy="12.5" r="2.5"
          fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <circle cx="17.5" cy="12.5" r="1.2"
          fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.8"/>
  <circle cx="17.5" cy="12.5" r="0.4"
          fill="currentColor"/>
</svg>
